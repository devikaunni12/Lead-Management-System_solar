<!--
This file is the main HTML template used by Vite.
React will mount inside the div with id="root".
-->
<!doctype html>
<html lang="en">
  <head>
    <!-- Use UTF-8 so text symbols render correctly. -->
    <meta charset="UTF-8" />
    <!-- Make layout responsive on mobile and desktop screens. -->
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <!-- Browser tab title for this app. -->
    <title>Golden Ray Lead Manager</title>
  </head>
  <body>
    <!-- React app root container. -->
    <div id="root"></div>
    <!-- Vite loads the TypeScript entry file from here. -->
    <script src="/src/main.tsx" type="module"></script>
  </body>
</html>
